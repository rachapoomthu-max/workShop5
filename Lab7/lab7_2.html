<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>Lab 7.2 - นำเข้า/ส่งออกข้อมูล JSON | SPU Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --primary: #1F4E44;
      --primary-dark: #153731;
      --accent: #E08E45;
      --text: #22271F;
      --muted: #6B7280;
      --border: #E5E1D8;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px 16px;
      line-height: 1.6;
    }

    h1,
    h3 {
      font-family: 'Prompt', sans-serif;
    }

    .card {
      max-width: 640px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: 0 2px 10px rgba(31, 78, 68, .06);
    }

    .tag {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-family: 'Prompt', sans-serif;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 10px;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    th {
      background: #F1EEE7;
    }

    td.num,
    th.num {
      text-align: right;
    }

    button {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'Prompt', sans-serif;
      font-size: 14px;
      cursor: pointer;
      margin-top: 14px;
      margin-right: 8px;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }

    input[type=file] {
      margin-top: 10px;
    }

    pre {
      background: #12211d;
      color: #d9f2ea;
      padding: 14px 16px;
      border-radius: 10px;
      overflow-x: auto;
      font-size: 13px;
      margin-top: 14px;
    }

    .summary {
      background: #F1F7F5;
      border: 1px solid #CFE3DC;
      border-radius: 10px;
      padding: 14px 18px;
      margin-top: 14px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>

<body>

  <div class="card">
    <span class="tag">Lab 7.2</span>
    <h1>นำเข้า / ส่งออกข้อมูลสินค้า (JSON)</h1>

    <div id="tableBox"></div>
    <div id="summaryBox"></div>

    <button onclick="exportData()">📤 Export เป็น JSON</button>
    <button class="secondary" onclick="document.getElementById('importFile').click()">📥 Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">

    <h3>ตัวอย่าง JSON ปัจจุบัน</h3>
    <pre id="jsonView"></pre>
  </div>

  <footer>CSI204 Digital Platform for Software Development — Lab 7.2</footer>

  <script>
    let products = [
      { name: "เสื้อยืดลายแบรนด์", price: 390, qty: 2 },
      { name: "หมวกแก๊ป SPU Shop", price: 250, qty: 1 },
      { name: "กระเป๋าผ้าแคนวาส", price: 320, qty: 3 }
    ];

    function render() {
      // แสดงตารางด้วย forEach()
      let tableHtml = `<table><tr><th>สินค้า</th><th class="num">ราคา</th><th class="num">จำนวน</th><th class="num">รวม</th></tr>`;
      products.forEach(p => {
        tableHtml += `<tr><td>${p.name}</td><td class="num">${p.price.toLocaleString()}</td>
      <td class="num">${p.qty}</td><td class="num">${(p.price * p.qty).toLocaleString()}</td></tr>`;
      });
      tableHtml += "</table>";
      document.getElementById("tableBox").innerHTML = tableHtml;

      // แปลงข้อมูลด้วย map() -> รายชื่อสินค้า
      let names = products.map(p => p.name).join(", ");

      // กรองด้วย filter() -> สินค้าที่ราคามากกว่า 300
      let premium = products.filter(p => p.price > 300).map(p => p.name).join(", ") || "ไม่มี";

      // สรุปด้วย reduce() -> ยอดรวมทั้งหมด
      let total = products.reduce((sum, p) => sum + p.price * p.qty, 0);

      document.getElementById("summaryBox").innerHTML = `
    <div class="summary">
      <p>รายชื่อสินค้าทั้งหมด: ${names}</p>
      <p>สินค้าราคา &gt; 300 บาท: ${premium}</p>
      <p><strong>ยอดรวมทั้งหมด: ${total.toLocaleString()} บาท</strong></p>
    </div>
  `;

      // แปลง Object เป็น JSON string ด้วย JSON.stringify()
      document.getElementById("jsonView").textContent = JSON.stringify(products, null, 2);
    }

    function exportData() {
      let jsonString = JSON.stringify(products, null, 2);
      let blob = new Blob([jsonString], { type: "application/json" });
      let url = URL.createObjectURL(blob);
      let a = document.createElement("a");
      a.href = url;
      a.download = "spu_shop_products.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      let file = event.target.files[0];
      if (!file) return;

      let reader = new FileReader();
      reader.onload = function (e) {
        try {
          // แปลง JSON string กลับเป็น Object ด้วย JSON.parse()
          let importedProducts = JSON.parse(e.target.result);
          products = importedProducts;
          render();
          alert("นำเข้าข้อมูลสำเร็จ");
        } catch (err) {
          alert("ไฟล์ JSON ไม่ถูกต้อง: " + err.message);
        }
      };
      reader.readAsText(file);
    }

    render();
  </script>
</body>

</html>
