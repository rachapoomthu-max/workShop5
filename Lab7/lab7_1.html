<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>Lab 7.1 - จัดการข้อมูลลูกค้า | SPU Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --primary: #1F4E44;
      --primary-dark: #153731;
      --accent: #E08E45;
      --text: #22271F;
      --muted: #6B7280;
      --border: #E5E1D8;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px 16px;
      line-height: 1.6;
    }

    h1,
    h3 {
      font-family: 'Prompt', sans-serif;
    }

    .card {
      max-width: 680px;
      margin: 0 auto 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: 0 2px 10px rgba(31, 78, 68, .06);
    }

    .tag {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-family: 'Prompt', sans-serif;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    th {
      background: #F1EEE7;
      font-family: 'Prompt', sans-serif;
    }

    td.num,
    th.num {
      text-align: right;
    }

    .tier-gold {
      color: #9A6A00;
      font-weight: 600;
    }

    .tier-silver {
      color: #6B7280;
      font-weight: 600;
    }

    .tier-bronze {
      color: #8A5A34;
      font-weight: 600;
    }

    .summary {
      background: #F1F7F5;
      border: 1px solid #CFE3DC;
      border-radius: 10px;
      padding: 16px 20px;
      margin-top: 18px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>

<body>

  <div class="card">
    <span class="tag">Lab 7.1</span>
    <h1>ระบบจัดการข้อมูลลูกค้า (Customer Tier)</h1>
    <p style="color:var(--muted);font-size:14px;">แบ่งระดับลูกค้าจากยอดซื้อสะสม: Gold ≥ 5,000 / Silver ≥ 2,000 / Bronze
      &lt; 2,000</p>

    <div id="tableBox"></div>
    <div id="summaryBox"></div>
  </div>

  <footer>CSI204 Digital Platform for Software Development — Lab 7.1</footer>

  <script>
    const customers = [
      { id: 1, name: "สมชาย ใจดี", totalSpend: 6800 },
      { id: 2, name: "สมหญิง รักช้อป", totalSpend: 2450 },
      { id: 3, name: "วิชัย มั่งมี", totalSpend: 9200 },
      { id: 4, name: "อารีย์ ประหยัด", totalSpend: 1200 },
      { id: 5, name: "กมล ตั้งใจ", totalSpend: 5300 }
    ];

    function getTier(spend) {
      if (spend >= 5000) return "Gold";
      if (spend >= 2000) return "Silver";
      return "Bronze";
    }

    function tierClass(tier) {
      return tier === "Gold" ? "tier-gold" : tier === "Silver" ? "tier-silver" : "tier-bronze";
    }

    function displayCustomers() {
      // แสดงข้อมูลด้วย map()
      let tableHtml = `<table><tr><th>ID</th><th>ชื่อลูกค้า</th><th class="num">ยอดซื้อสะสม</th><th>ระดับ</th></tr>`;
      customers.map(c => {
        let tier = getTier(c.totalSpend);
        tableHtml += `<tr><td>${c.id}</td><td>${c.name}</td>
      <td class="num">${c.totalSpend.toLocaleString()}</td>
      <td class="${tierClass(tier)}">${tier}</td></tr>`;
      });
      tableHtml += "</table>";
      document.getElementById("tableBox").innerHTML = tableHtml;

      // คำนวณค่าเฉลี่ยด้วย reduce()
      let avgSpend = customers.reduce((sum, c) => sum + c.totalSpend, 0) / customers.length;

      // หาลูกค้าที่ได้ระดับ Gold ด้วย filter()
      let goldCustomers = customers.filter(c => getTier(c.totalSpend) === "Gold");

      document.getElementById("summaryBox").innerHTML = `
    <div class="summary">
      <p>ยอดซื้อเฉลี่ยของลูกค้าทั้งหมด: <strong>${avgSpend.toLocaleString(undefined, { maximumFractionDigits: 2 })} บาท</strong></p>
      <p>ลูกค้าระดับ Gold: <strong>${goldCustomers.map(c => c.name).join(", ") || "ไม่มี"}</strong></p>
    </div>
  `;
    }

    displayCustomers();
  </script>
</body>

</html>
