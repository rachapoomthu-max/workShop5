<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Lab 7.1 - Student Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --primary: #1F4E44;
      --primary-dark: #153731;
      --accent: #E08E45;
      --text: #22271F;
      --muted: #6B7280;
      --border: #E5E1D8;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px 16px;
      line-height: 1.6;
    }

    h1,
    h2,
    h3 {
      font-family: 'Prompt', sans-serif;
    }

    .card {
      max-width: 900px;
      margin: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: 0 2px 10px rgba(31, 78, 68, .06);
    }

    .tag {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 12px;
      font-family: 'Prompt', sans-serif;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 14px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: #F1EEE7;
      text-align: left;
    }

    td {
      background: white;
    }

    .result {
      margin-top: 20px;
      background: #F1F7F5;
      border: 1px solid #CFE3DC;
      border-radius: 10px;
      padding: 18px;
    }

    ul {
      margin-top: 10px;
    }

    footer {
      margin-top: 25px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="card">
    <span class="tag">Lab 7.1</span>
    <h1>Student Management</h1>

    <table>

      <thead>

        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Score</th>
          <th>Grade</th>
        </tr>

      </thead>

      <tbody id="studentTable">

      </tbody>

    </table>

    <div class="result">

      <h2>Summary</h2>

      <p id="averageScore"></p>

      <h3>Students Grade A</h3>

      <ul id="gradeAList"></ul>

    </div>

  </div>

  <script>

    const students = [

      {
        id: 1,
        name: "Ball",
        score: 95,
        grade: "A"
      },

      {
        id: 2,
        name: "Babe",
        score: 88,
        grade: "B"
      },

      {
        id: 3,
        name: "Mike",
        score: 76,
        grade: "C"
      },

      {
        id: 4,
        name: "Aha",
        score: 91,
        grade: "A"
      },

      {
        id: 5,
        name: "Bob",
        score: 69,
        grade: "D"
      }

    ];


    // =========================
    // map()
    // =========================

    const tableBody = document.getElementById("studentTable");

    tableBody.innerHTML = students.map(student => `

<tr>
    <td>${student.id}</td>
    <td>${student.name}</td>
    <td>${student.score}</td>
    <td>${student.grade}</td>
</tr>

`).join("");



    // =========================
    // reduce()
    // =========================

    const totalScore = students.reduce((sum, student) => {

      return sum + student.score;

    }, 0);

    const average = totalScore / students.length;

    document.getElementById("averageScore").innerHTML =
      `<strong>Average Score :</strong> ${average.toFixed(2)}`;




    // =========================
    // filter()
    // =========================

    const gradeAStudents = students.filter(student => {

      return student.grade === "A";

    });

    const gradeAList = document.getElementById("gradeAList");

    gradeAList.innerHTML = gradeAStudents.map(student => `

<li>
${student.name} (${student.score})
</li>

`).join("");

  </script>

</body>

</html>
