<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Lab 3.1 - คำนวณสินเชื่อบ้าน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #FAF7F2;
            --surface: #FFFFFF;
            --primary: #1F4E44;
            --primary-dark: #153731;
            --accent: #E08E45;
            --text: #22271F;
            --muted: #6B7280;
            --border: #E5E1D8;
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 32px 16px;
            line-height: 1.6;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Prompt', sans-serif;
        }

        .card {
            max-width: 560px;
            margin: 0 auto 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: 0 2px 10px rgba(31, 78, 68, .06);
        }

        .tag {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 12px;
            font-family: 'Prompt', sans-serif;
        }

        label {
            font-weight: 600;
            display: block;
            margin: 14px 0 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            outline: 2px solid var(--accent);
            border-color: var(--accent);
        }

        button {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-family: 'Prompt', sans-serif;
            font-size: 15px;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .result {
            background: #F1F7F5;
            border: 1px solid #CFE3DC;
            border-radius: 10px;
            padding: 16px 20px;
            margin-top: 18px;
            font-size: 14px;
        }

        .result p {
            margin: 4px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            font-size: 13px;
        }

        th,
        td {
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            text-align: right;
        }

        th:first-child,
        td:first-child {
            text-align: center;
        }

        th {
            background: #F1EEE7;
        }

        .warn {
            color: #B3261E;
            font-size: 13px;
            margin-top: 6px;
        }

        footer {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            margin-top: 24px;
        }
    </style>
</head>

<body>

    <div class="card">
        <span class="tag">Lab 3.1</span>
        <h1>ฟอร์มคำนวณสินเชื่อบ้าน</h1>

        <label for="salary">เงินเดือน (บาท)</label>
        <input type="number" id="salary" placeholder="เช่น 30000">

        <label for="loanAmount">จำนวนเงินกู้ที่ต้องการ (บาท)</label>
        <input type="number" id="loanAmount" placeholder="เช่น 2000000">

        <label for="interestRate">อัตราดอกเบี้ย (% ต่อปี)</label>
        <input type="number" id="interestRate" value="5" step="0.1">

        <label for="years">ระยะเวลากู้ (ปี)</label>
        <input type="number" id="years" value="20">

        <button onclick="calculateLoan()">คำนวณค่างวด</button>
        <div class="warn" id="warnBox"></div>
        <div id="result"></div>
    </div>

    <footer>CSI204 Digital Platform for Software Development — Lab 3.1</footer>

    <script>
        function calculateLoan() {
            let monthlySalary = parseFloat(document.getElementById("salary").value);
            let loanAmount = parseFloat(document.getElementById("loanAmount").value);
            let interestRate = parseFloat(document.getElementById("interestRate").value) / 100 / 12;
            let years = parseInt(document.getElementById("years").value);
            let months = years * 12;

            let warnBox = document.getElementById("warnBox");
            warnBox.textContent = "";

            if (isNaN(monthlySalary) || monthlySalary <= 0) {
                warnBox.textContent = "กรุณากรอกเงินเดือนให้ถูกต้อง";
                return;
            }
            if (isNaN(loanAmount) || loanAmount <= 0) {
                warnBox.textContent = "กรุณากรอกจำนวนเงินกู้ให้ถูกต้อง";
                return;
            }

            // ตรวจสอบวงเงินสูงสุด (200 เท่าของเงินเดือน)
            let maxLoan = monthlySalary * 200;
            if (loanAmount > maxLoan) {
                warnBox.textContent = `วงเงินกู้สูงสุดที่อนุมัติได้คือ ${maxLoan.toLocaleString()} บาท (200 เท่าของเงินเดือน)`;
                return;
            }

            // คำนวณค่างวดรายเดือน (สูตร PMT)
            let monthlyPayment = (loanAmount * interestRate * Math.pow(1 + interestRate, months)) /
                (Math.pow(1 + interestRate, months) - 1);

            if (isNaN(monthlyPayment) || !isFinite(monthlyPayment)) {
                monthlyPayment = loanAmount / months;
            }

            let totalPayment = monthlyPayment * months;
            let totalInterest = totalPayment - loanAmount;

            document.getElementById("result").innerHTML = `
    <div class="result">
      <h3>สรุปสินเชื่อบ้าน</h3>
      <p>วงเงินกู้: ${loanAmount.toLocaleString(undefined, { minimumFractionDigits: 2 })} บาท</p>
      <p>อัตราดอกเบี้ย: ${(interestRate * 1200).toFixed(2)}% ต่อปี</p>
      <p>ระยะเวลา: ${years} ปี (${months} เดือน)</p>
      <p><strong>ค่างวดต่อเดือน: ${monthlyPayment.toLocaleString(undefined, { minimumFractionDigits: 2 })} บาท</strong></p>
      <p>รวมทั้งสิ้น: ${totalPayment.toLocaleString(undefined, { minimumFractionDigits: 2 })} บาท</p>
      <p>ดอกเบี้ยรวม: ${totalInterest.toLocaleString(undefined, { minimumFractionDigits: 2 })} บาท</p>
    </div>
  `;
        }
    </script>
</body>

</html>
