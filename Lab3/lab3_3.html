<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Lab 3.3 - คำนวณค่าไฟฟ้า</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #FAF7F2;
            --surface: #FFFFFF;
            --primary: #1F4E44;
            --primary-dark: #153731;
            --accent: #E08E45;
            --text: #22271F;
            --muted: #6B7280;
            --border: #E5E1D8;
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 32px 16px;
            line-height: 1.6;
        }

        h1,
        h2,
        h3 {
            font-family: 'Prompt', sans-serif;
        }

        .card {
            max-width: 520px;
            margin: 0 auto 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: 0 2px 10px rgba(31, 78, 68, .06);
        }

        .tag {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 12px;
            font-family: 'Prompt', sans-serif;
        }

        label {
            font-weight: 600;
            display: block;
            margin: 14px 0 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            outline: 2px solid var(--accent);
            border-color: var(--accent);
        }

        button {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-family: 'Prompt', sans-serif;
            font-size: 15px;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .result {
            background: #F1F7F5;
            border: 1px solid #CFE3DC;
            border-radius: 10px;
            padding: 16px 20px;
            margin-top: 18px;
            font-size: 14px;
        }

        .result p {
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .result p strong {
            font-size: 15px;
        }

        .warn {
            color: #B3261E;
            font-size: 13px;
            margin-top: 6px;
        }

        footer {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            margin-top: 24px;
        }
    </style>
</head>

<body>

    <div class="card">
        <span class="tag">Lab 3.3</span>
        <h1>ฟอร์มคำนวณค่าไฟฟ้าภายในบ้าน</h1>

        <label for="prevUnit">เลขมิเตอร์เดือนก่อนหน้า (หน่วย)</label>
        <input type="number" id="prevUnit" placeholder="เช่น 1200">

        <label for="currentUnit">เลขมิเตอร์เดือนปัจจุบัน (หน่วย)</label>
        <input type="number" id="currentUnit" placeholder="เช่น 1450">

        <button onclick="calculateElectricity()">คำนวณค่าไฟ</button>
        <div class="warn" id="warnBox"></div>
        <div id="result"></div>
    </div>

    <footer>CSI204 Digital Platform for Software Development — Lab 3.3</footer>

    <script>
        function calculateElectricity() {
            let prevUnit = parseFloat(document.getElementById("prevUnit").value);
            let currentUnit = parseFloat(document.getElementById("currentUnit").value);

            let warnBox = document.getElementById("warnBox");
            warnBox.textContent = "";

            if (isNaN(prevUnit) || isNaN(currentUnit) || currentUnit < prevUnit) {
                warnBox.textContent = "กรุณากรอกเลขมิเตอร์ให้ถูกต้อง (เดือนปัจจุบันต้องมากกว่าหรือเท่ากับเดือนก่อนหน้า)";
                return;
            }

            let usedUnit = currentUnit - prevUnit;
            let ftRate = 0.6772; // บาทต่อหน่วย (ค่า Ft โดยประมาณ)
            let energyCost = 0;

            // อัตราค่าไฟฟ้าแบบก้าวหน้า (อัตราประมาณของบ้านพักอาศัย)
            if (usedUnit <= 150) {
                energyCost = usedUnit * 3.25;
            } else if (usedUnit <= 400) {
                energyCost = 150 * 3.25 + (usedUnit - 150) * 4.22;
            } else {
                energyCost = 150 * 3.25 + 250 * 4.22 + (usedUnit - 400) * 4.42;
            }

            let ftCost = usedUnit * ftRate;
            let totalBeforeVat = energyCost + ftCost;
            let vat = totalBeforeVat * 0.07;
            let total = totalBeforeVat + vat;

            document.getElementById("result").innerHTML = `
    <div class="result">
      <h3>สรุปค่าไฟฟ้า</h3>
      <p><span>หน่วยที่ใช้:</span> <span>${usedUnit.toFixed(2)} หน่วย</span></p>
      <p><span>ค่าพลังงานไฟฟ้า:</span> <span>${energyCost.toFixed(2)} บาท</span></p>
      <p><span>ค่า Ft (${ftRate} บาท/หน่วย):</span> <span>${ftCost.toFixed(2)} บาท</span></p>
      <p><span>รวมก่อนภาษี:</span> <span>${totalBeforeVat.toFixed(2)} บาท</span></p>
      <p><span>ภาษีมูลค่าเพิ่ม 7%:</span> <span>${vat.toFixed(2)} บาท</span></p>
      <p><strong>ยอดชำระทั้งสิ้น:</strong> <strong>${total.toFixed(2)} บาท</strong></p>
    </div>
  `;
        }
    </script>
</body>

</html>
