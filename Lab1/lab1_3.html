<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1.3 - Landing Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        header {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 20px;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        .card {

            width: 850px;
            background: white;

            display: flex;
            align-items: center;
            gap: 50px;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0 10px 20px rgba(0, 0, 0, .15);

        }

        .left {
            flex: 1;
            text-align: center;
        }

        .right {
            flex: 1;
        }

        img {

            width: 250px;
            height: 250px;

            border-radius: 50%;

            object-fit: cover;
            object-position: center top;

        }

        h2 {

            font-size: 36px;

            margin-bottom: 30px;

            color: #333;

        }

        p {

            font-size: 22px;

            margin: 18px 0;

        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h1>About Me</h1>
    </header>

    <main>

        <div class="card">

            <div class="left">

                <img src="/Img/stdempimg.gif" alt="Profile">

            </div>

            <div class="right">

                <h2>Student Information</h2>

                <p><strong>First Name :</strong> Rachanon</p>

                <p><strong>Last Name :</strong> Thumpracha</p>

                <p><strong>Student ID :</strong> 67159224</p>

            </div>

        </div>

    </main>

    <footer>
        CSI204 Digital Platform for Software Development
    </footer>

</body>

</html>
