<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>Lab 8.1 - ตารางผ่อนชำระสินเชื่อ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --primary: #1F4E44;
      --primary-dark: #153731;
      --accent: #E08E45;
      --text: #22271F;
      --muted: #6B7280;
      --border: #E5E1D8;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px 16px;
      line-height: 1.6;
    }

    h1,
    h3 {
      font-family: 'Prompt', sans-serif;
    }

    .card {
      max-width: 680px;
      margin: 0 auto 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: 0 2px 10px rgba(31, 78, 68, .06);
    }

    .tag {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-family: 'Prompt', sans-serif;
    }

    label {
      font-weight: 600;
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      font-family: 'Prompt', sans-serif;
      font-size: 15px;
      cursor: pointer;
      margin-top: 16px;
      width: 100%;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .summary {
      background: #F1F7F5;
      border: 1px solid #CFE3DC;
      border-radius: 10px;
      padding: 14px 18px;
      margin-top: 16px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      font-size: 13px;
      max-height: 400px;
    }

    th,
    td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      text-align: right;
    }

    th:first-child,
    td:first-child {
      text-align: center;
    }

    th {
      background: #F1EEE7;
      position: sticky;
      top: 0;
    }

    .tablewrap {
      max-height: 360px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>

<body>

  <div class="card">
    <span class="tag">Lab 8.1</span>
    <h1>ระบบคำนวณสินเชื่อ (ตารางผ่อนชำระ)</h1>

    <label for="loanAmount">จำนวนเงินกู้ (บาท)</label>
    <input type="number" id="loanAmount" value="500000">

    <label for="interestRate">อัตราดอกเบี้ย (% ต่อปี)</label>
    <input type="number" id="interestRate" value="6" step="0.1">

    <label for="months">ระยะเวลา (เดือน)</label>
    <input type="number" id="months" value="12">

    <button onclick="generateAmortizationTable()">สร้างตารางผ่อนชำระ</button>

    <div id="summaryBox"></div>
    <div class="tablewrap">
      <table id="amortTable"></table>
    </div>
  </div>

  <footer>CSI204 Digital Platform for Software Development — Lab 8.1</footer>

  <script>
    function generateAmortizationTable() {
      let loanAmount = parseFloat(document.getElementById("loanAmount").value);
      let interestRate = parseFloat(document.getElementById("interestRate").value) / 100 / 12;
      let months = parseInt(document.getElementById("months").value);

      let monthlyPayment = (loanAmount * interestRate * Math.pow(1 + interestRate, months)) /
        (Math.pow(1 + interestRate, months) - 1);

      let tableHtml = "<tr><th>งวดที่</th><th>ค่างวด</th><th>ดอกเบี้ย</th><th>เงินต้น</th><th>คงเหลือ</th></tr>";
      let remaining = loanAmount;
      let totalInterest = 0;

      // สร้างตารางผ่อนชำระด้วย for loop
      for (let i = 1; i <= months; i++) {
        let interest = remaining * interestRate;
        let principal = monthlyPayment - interest;
        remaining -= principal;
        totalInterest += interest;

        tableHtml += `<tr>
      <td>${i}</td>
      <td>${monthlyPayment.toFixed(2)}</td>
      <td>${interest.toFixed(2)}</td>
      <td>${principal.toFixed(2)}</td>
      <td>${Math.max(0, remaining).toFixed(2)}</td>
    </tr>`;
      }

      document.getElementById("amortTable").innerHTML = tableHtml;
      document.getElementById("summaryBox").innerHTML = `
    <div class="summary">
      <p>ค่างวดต่อเดือน: <strong>${monthlyPayment.toFixed(2)} บาท</strong></p>
      <p>ยอดรวมที่ต้องชำระ: <strong>${(monthlyPayment * months).toFixed(2)} บาท</strong></p>
      <p>ดอกเบี้ยรวม: <strong>${totalInterest.toFixed(2)} บาท</strong></p>
    </div>
  `;
    }

    generateAmortizationTable();
  </script>
</body>

</html>
