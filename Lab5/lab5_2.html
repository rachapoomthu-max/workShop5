<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>Lab 5.2 - คำนวณค่าส่ง | SPU Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --primary: #1F4E44;
      --primary-dark: #153731;
      --accent: #E08E45;
      --text: #22271F;
      --muted: #6B7280;
      --border: #E5E1D8;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px 16px;
      line-height: 1.6;
    }

    h1,
    h3 {
      font-family: 'Prompt', sans-serif;
    }

    .card {
      max-width: 460px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: 0 2px 10px rgba(31, 78, 68, .06);
    }

    .tag {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-family: 'Prompt', sans-serif;
    }

    label {
      font-weight: 600;
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      font-family: 'Prompt', sans-serif;
      font-size: 15px;
      cursor: pointer;
      margin-top: 18px;
      width: 100%;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .result {
      background: #F1F7F5;
      border: 1px solid #CFE3DC;
      border-radius: 10px;
      padding: 16px 20px;
      margin-top: 18px;
      font-size: 14px;
    }

    .result p {
      margin: 4px 0;
      display: flex;
      justify-content: space-between;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>

<body>

  <div class="card">
    <span class="tag">Lab 5.2</span>
    <h1>คำนวณค่าจัดส่ง</h1>

    <label for="orderTotal">ยอดสั่งซื้อสินค้า (บาท)</label>
    <input type="number" id="orderTotal" placeholder="เช่น 650">

    <label for="shipMethod">รูปแบบการจัดส่ง</label>
    <select id="shipMethod">
      <option value="50">EMS (50 บาท)</option>
      <option value="30">ลงทะเบียน (30 บาท)</option>
      <option value="15">ธรรมดา (15 บาท)</option>
    </select>

    <button onclick="calculateShipping()">คำนวณยอดรวม</button>
    <div id="result"></div>
  </div>

  <footer>CSI204 Digital Platform for Software Development — Lab 5.2</footer>

  <script>
    function calculateShipping() {
      let orderTotal = parseFloat(document.getElementById("orderTotal").value) || 0;
      let shipMethod = document.getElementById("shipMethod");
      let shipCost = parseFloat(shipMethod.value);
      let shipLabel = shipMethod.options[shipMethod.selectedIndex].text;

      // เงื่อนไขพิเศษ: ซื้อครบ 500 บาท ส่งฟรี
      let freeShipping = orderTotal >= 500;
      if (freeShipping) shipCost = 0;

      let total = orderTotal + shipCost;

      document.getElementById("result").innerHTML = `
    <div class="result">
      <h3>สรุปยอดชำระ</h3>
      <p><span>ยอดสินค้า:</span><span>${orderTotal.toLocaleString()} บาท</span></p>
      <p><span>ค่าจัดส่ง (${shipLabel}):</span><span>${freeShipping ? "ฟรี 🎉" : shipCost.toLocaleString() + " บาท"}</span></p>
      <p><strong>ยอดชำระทั้งหมด:</strong><strong>${total.toLocaleString()} บาท</strong></p>
      ${freeShipping ? '<p style="color:#1F6B45;">✓ ยอดซื้อครบ 500 บาท ได้รับสิทธิ์จัดส่งฟรี</p>' : ""}
    </div>
  `;
    }
  </script>
</body>

</html>
